version: '3.8'

services:
  # ── API ─────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      target: production
    container_name: accident-api
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      API_PREFIX: api/v1
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: accident_dev
      DB_PASSWORD: dev_password_2024
      DB_NAME: accident_assessment
      DB_SYNC: 'true'
      JWT_SECRET: local-dev-secret-change-in-production-32chars
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_SECRET: local-dev-refresh-secret-change-in-prod
      JWT_REFRESH_EXPIRES_IN: 30d
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: accident-postgres
    environment:
      POSTGRES_USER: accident_dev
      POSTGRES_PASSWORD: dev_password_2024
      POSTGRES_DB: accident_assessment
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U accident_dev -d accident_assessment']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── pgAdmin (optional UI) ────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: accident-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@accident.dev
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - '5050:80'
    depends_on:
      - postgres
    profiles:
      - tools   # only starts with: docker compose --profile tools up

volumes:
  pgdata: